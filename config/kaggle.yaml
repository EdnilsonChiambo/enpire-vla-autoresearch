task:
  base_instruction: "pick up the spoon"
  episodes: 5

loop:
  iterations: 5

env:
  backend: simpler
  simpler_backend: maniskill3
  simpler_task: widowx_spoon_on_towel

vla:
  backend: openvla-4bit
  model_id: openvla/openvla-7b
  policy_setup: bridge_orig

llm:
  provider: openai
  model: gpt-4o-mini

paths:
  logs_dir: logs
  latest_eval_log: logs/latest_eval_log.txt
  history_tree_log: logs/history_tree.log
  best_run: logs/best_run.json
